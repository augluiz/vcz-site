name: Atualizar dados CEASA e Clima

# Quando este workflow roda:
#   - 3 tentativas por dia util para o CEASA (caso o PDF ainda nao tenha subido)
#   - 1 vez por dia para o clima (historico + previsao de 16 dias)
#   - workflow_dispatch: permite rodar manualmente pelo GitHub (aba Actions)
#
# Horarios em UTC (Brasil = UTC-3, sem horario de verao):
#   13:30 UTC = 10:30 BRT  |  14:30 UTC = 11:30 BRT  |  17:05 UTC = 14:05 BRT
#   11:00 UTC = 08:00 BRT
on:
  schedule:
    - cron: '30 13 * * 1-5'   # 10:30 BRT — 1a tentativa CEASA (seg-sex)
    - cron: '30 14 * * 1-5'   # 11:30 BRT — 2a tentativa CEASA
    - cron: '5 17 * * 1-5'    # 14:05 BRT — 3a tentativa CEASA
    - cron: '0 11 * * *'      # 08:00 BRT — clima (todos os dias)
  workflow_dispatch:           # botao "Run workflow" na aba Actions do GitHub

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # necessario para fazer commit de volta ao repositorio

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'ceasa_dashboard/requirements.txt'

      - name: Instalar dependencias Python
        run: pip install -r ceasa_dashboard/requirements.txt

      - name: Extrair cotacoes CEASA
        run: python ceasa_dashboard/extrair_ceasa.py
        continue-on-error: true   # nao cancela o workflow se o CEASA estiver fora

      - name: Atualizar dados climaticos
        run: python ceasa_dashboard/clima_sc.py
        continue-on-error: true   # nao cancela se a API do Open-Meteo estiver fora

      - name: Commitar e publicar dados atualizados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ceasa_dashboard/dados/
          # Só commita se houver mudanca real (evita commits vazios)
          git diff --staged --quiet || git commit -m "data: atualiza cotacoes e clima $(date +%Y-%m-%d)"
          git push
